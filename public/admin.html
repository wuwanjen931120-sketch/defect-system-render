<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理後台</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      background:linear-gradient(135deg,#08111f,#10233b);
      color:#eaf2ff;
      font-family:"Microsoft JhengHei", Arial, sans-serif;
    }

    .adminPage{
      padding:28px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
      gap:16px;
      flex-wrap:wrap;
    }

    .titleBox h1{
      margin:0;
      font-size:28px;
      font-weight:900;
      letter-spacing:1px;
    }

    .titleBox p{
      margin:8px 0 0;
      color:#9bb0cf;
      font-size:14px;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 18px;
      font-weight:800;
      cursor:pointer;
      color:white;
      background:#244b7a;
      border:1px solid rgba(255,255,255,.15);
      text-decoration:none;
    }

    .btn:hover{
      background:#31639e;
    }

    .btnPrimary{
      background:#2563eb;
    }

    .btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

    .infoCards{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      margin-bottom:22px;
    }

    .card{
      background:rgba(18,35,59,.82);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }

    .card .label{
      color:#9bb0cf;
      font-size:13px;
      margin-bottom:8px;
    }

    .card .value{
      font-size:24px;
      font-weight:900;
    }

    .tableCard{
      background:rgba(18,35,59,.82);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }

    .tableHeader{
      padding:18px 20px;
      border-bottom:1px solid rgba(255,255,255,.1);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tableHeader h2{
      margin:0;
      font-size:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:rgba(255,255,255,.06);
      color:#b9d6ff;
      text-align:left;
      padding:14px;
      font-size:14px;
    }

    td{
      padding:14px;
      border-top:1px solid rgba(255,255,255,.08);
      font-size:14px;
    }

    tr:hover{
      background:rgba(255,255,255,.05);
    }

    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(59,130,246,.18);
      border:1px solid rgba(96,165,250,.35);
      color:#dbeafe;
      font-weight:800;
      font-size:13px;
    }

    .empty{
      text-align:center;
      color:#9bb0cf;
      padding:30px;
    }

    @media(max-width:768px){
      .adminPage{
        padding:16px;
      }

      .infoCards{
        grid-template-columns:1fr;
      }

      table{
        font-size:12px;
      }

      th,td{
        padding:10px;
      }
    }

    body{
  font-size:18px;
}

.titleBox h1{
  font-size:34px;
}

.titleBox p{
  font-size:17px;
}

.card .label{
  font-size:16px;
}

.card .value{
  font-size:30px;
}

.tableHeader h2{
  font-size:26px;
}

th{
  font-size:17px;
  padding:18px;
}

td{
  font-size:17px;
  padding:18px;
}

.badge{
  font-size:15px;
  padding:7px 14px;
}

.tableScroll{
  max-height:520px;
  overflow-y:auto;
  overflow-x:auto;
}
  </style>
</head>

<body>
  <div class="adminPage">

    <div class="topbar">
      <div class="titleBox">
        <h1>客戶管理後台</h1>
        <p>管理 SaaS 多客戶帳號、公司與 tenant 資料</p>
      </div>

      <div class="actions">
       
  <button class="btn" onclick="location.href='dashboard.html'">← 返回首頁</button>
  <button class="btn btnPrimary" type="button" id="refreshBtn">重新整理</button>
  <button class="btn btnPrimary" type="button" id="mongoBtn">MongoDB 管理頁</button>
</div>

      
    </div>

    <div class="infoCards">
      <div class="card">
        <div class="label">目前登入角色</div>
        <div class="value" id="roleText">-</div>
      </div>

      <div class="card">
        <div class="label">帳號總數</div>
        <div class="value" id="userCount">0</div>
      </div>

      <div class="card">
        <div class="label">系統狀態</div>
        <div class="value" style="color:#22c55e;">正常</div>
      </div>
    </div>

    <div class="tableCard">
      <div class="tableHeader">
        <h2>客戶帳號清單</h2>
        <span class="badge">Admin View</span>
      </div>

      <div class="tableScroll">
<table>
        <thead>
          <tr>
            <th>公司</th>
            <th>帳號</th>
            <th>角色</th>
            <th>tenant_id</th>
          </tr>
        </thead>
        <tbody id="userTable">
          <tr>
            <td colspan="4" class="empty">資料載入中...</td>
          </tr>
        </tbody>
     </table>
</div>

  </div>

  <script>
    const API_BASE = window.location.origin;

    const token = sessionStorage.getItem("token");
    const role = sessionStorage.getItem("role");
   



    if (!token) {
      window.location.replace("login.html");
    }

    const canOpenAdmin =
      role === "super_admin" ||
      role === "tenant_admin" ||
      role === "admin";

    if (!canOpenAdmin) {
      alert("你不是管理員，無法進入管理後台");
      window.location.replace("dashboard.html");
    }

    document.getElementById("roleText").textContent = role || "-";
    const mongoBtn = document.getElementById("mongoBtn");

if (role !== "super_admin") {
  mongoBtn.style.display = "none";
} else {
  mongoBtn.onclick = () => {
    location.href = "mongo-admin.html";
  };
}
    

    const refreshBtn = document.getElementById("refreshBtn");

refreshBtn.addEventListener("click", async () => {
  refreshBtn.disabled = true;
  refreshBtn.textContent = "重新整理中...";

  await loadUsers();

  refreshBtn.textContent = "重新整理";
  refreshBtn.disabled = false;
});
    async function loadUsers() {
      try {
        const res = await fetch(`${API_BASE}/api/admin/users`, {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        if (res.status === 401) {
          alert("登入已過期，請重新登入");
          sessionStorage.clear();
          window.location.replace("login.html");
          return;
        }

        if (res.status === 403) {
          alert("權限不足");
          window.location.replace("dashboard.html");
          return;
        }

        const data = await res.json();

        const table = document.getElementById("userTable");
        const userCount = document.getElementById("userCount");

        table.innerHTML = "";
        userCount.textContent = Array.isArray(data) ? data.length : 0;

        if (!Array.isArray(data) || data.length === 0) {
          table.innerHTML = `
            <tr>
              <td colspan="4" class="empty">目前沒有客戶資料</td>
            </tr>
          `;
          return;
        }

        data.forEach(u => {
          table.innerHTML += `
            <tr>
              <td>${u.company || "未設定公司"}</td>
              <td><b>${u.username || "-"}</b></td>
              <td><span class="badge">${u.role || "-"}</span></td>
              <td>${u.tenant_id || "-"}</td>
            </tr>
          `;
        });

      } catch (err) {
        console.error(err);
        alert("無法讀取管理後台資料");
      }
    }

    loadUsers();
  </script>
</body>
</html>
