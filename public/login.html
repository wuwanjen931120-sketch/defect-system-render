<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登入 - 瑕疵辨識與分流系統</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .loginCard{
      width:min(520px, 100%);
      background: rgba(18,35,59,.75);
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .title{
      font-size:20px;
      font-weight:900;
      margin:0 0 8px;
      letter-spacing:.7px;
    }
    .sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      margin:0 0 14px;
    }
    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:10px 0 6px;
    }
    input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline:none;
      box-sizing:border-box;
    }
    input:focus{
      border-color: rgba(59,130,246,.45);
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    .hint{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      line-height:1.7;
      border-top:1px solid rgba(255,255,255,.10);
      padding-top:12px;
    }
    .err{
      margin-top:10px;
      display:none;
      padding:10px 12px;
      border-radius:14px;
      background: rgba(239,68,68,.15);
      border:1px solid rgba(239,68,68,.28);
      color: rgba(231,238,252,.95);
      font-size:13px;
    }
    .ok{
      margin-top:10px;
      display:none;
      padding:10px 12px;
      border-radius:14px;
      background: rgba(34,197,94,.15);
      border:1px solid rgba(34,197,94,.28);
      color: rgba(231,238,252,.95);
      font-size:13px;
    }
    .serviceStatus{
      margin-top:10px;
      padding:9px 11px;
      border-radius:12px;
      font-size:12px;
      line-height:1.5;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.14);
      color:var(--muted);
    }
    .serviceStatus.ready{
      border-color:rgba(34,197,94,.30);
      background:rgba(34,197,94,.10);
      color:#bbf7d0;
    }
    .serviceStatus.warning{
      border-color:rgba(245,158,11,.38);
      background:rgba(245,158,11,.12);
      color:#fde68a;
    }

    /* =========================
       登入頁 3D 立體按鈕
       讓寄送驗證碼、回首頁、修復、前往註冊
       跟驗證並登入按鈕同一種風格
       ========================= */
    .loginCard .btn,
    .loginCard .btnPrimary{
      min-height:34px;
      padding:0 11px;
      border-radius:10px;
      border:1px solid rgba(147,197,253,.42);
      background:linear-gradient(180deg, #3274bd 0%, #24558e 52%, #173e6d 100%);
      color:#ffffff;
      font-size:12.5px;
      font-weight:800;
      letter-spacing:.1px;
      cursor:pointer;
      text-decoration:none;
      box-shadow:
        0 3px 0 rgba(5,18,34,.95),
        0 7px 13px rgba(0,0,0,.24),
        inset 0 1px 0 rgba(255,255,255,.24),
        inset 0 -1px 0 rgba(0,0,0,.18);
      transition:
        transform .12s ease,
        box-shadow .12s ease,
        background .12s ease,
        border-color .12s ease;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .loginCard .btnPrimary{
      background:linear-gradient(180deg, #3b8bff 0%, #2563eb 52%, #1e40af 100%);
      border-color:rgba(191,219,254,.62);
    }

    .loginCard .btn:hover,
    .loginCard .btnPrimary:hover{
      transform:translateY(-1px);
      background:linear-gradient(180deg, #4a90df 0%, #2f6eb4 52%, #1e4f86 100%);
      border-color:rgba(191,219,254,.70);
      box-shadow:
        0 4px 0 rgba(5,18,34,.95),
        0 9px 16px rgba(0,0,0,.30),
        inset 0 1px 0 rgba(255,255,255,.30),
        inset 0 -1px 0 rgba(0,0,0,.14);
    }

    .loginCard .btnPrimary:hover{
      background:linear-gradient(180deg, #60a5fa 0%, #3b82f6 52%, #1d4ed8 100%);
    }

    .loginCard .btn:active,
    .loginCard .btnPrimary:active{
      transform:translateY(2px);
      background:linear-gradient(180deg, #12385f 0%, #0f2c4f 55%, #071d36 100%);
      border-color:rgba(96,165,250,.35);
      box-shadow:
        0 1px 0 rgba(5,18,34,1),
        0 3px 7px rgba(0,0,0,.32),
        inset 0 2px 7px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    .loginCard .btn:disabled,
    .loginCard .btnPrimary:disabled{
      opacity:.58;
      cursor:not-allowed;
      transform:none;
      box-shadow:
        0 2px 0 rgba(5,18,34,.85),
        0 4px 8px rgba(0,0,0,.18),
        inset 0 1px 0 rgba(255,255,255,.12);
    }

    @media(max-width:560px){
      .row .btn,
      .row .btnPrimary{
        width:100%;
        justify-content:center;
      }
    }
  </style>

</head>
<body>

  <div class="wrap">
    <div class="loginCard">
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="logo"></div>
        <div>
          <h1 class="title">登入</h1>
          <div class="sub">請輸入帳號與密碼進入系統（JWT 登入驗證版）</div>
        </div>
      </div>

      <div class="err" id="errBox"></div>
      <div class="ok" id="okBox"></div>
      <div class="serviceStatus" id="serviceStatus" role="status" aria-live="polite">正在檢查登入服務...</div>

      <label for="email">信箱</label>
      <input id="email" type="email" placeholder="請輸入信箱" autocomplete="email" />

      <label for="pass">密碼</label>
      <input id="pass" type="password" placeholder="請輸入密碼" autocomplete="current-password" />

      <label for="code">信箱驗證碼</label>
      <input id="code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="請輸入信箱收到的 6 位數驗證碼" />

      <div class="row">
        <button class="btn" type="button" id="btnSendCode">寄送驗證碼</button>
        <button class="btn btnPrimary" type="button" id="btnLogin">驗證並登入</button>
        <button class="btn" type="button" id="btnHome">回首頁</button>
        <button class="btn" type="button" id="btnFix">修復灰底/警告（清快取）</button>
      </div>

      <div class="hint">
        <div>📌 登入流程：帳號密碼驗證 → 寄送一次性驗證碼 → 驗證成功後簽發 JWT。</div>
        <div>✅ 登入成功後會儲存 token、角色、使用者與可使用的機台。</div>
        <div>✅ 若遇到灰底或快取問題，可使用下方修復功能。</div>
        <div style="margin-top:8px;">
          🔐 本系統需先註冊帳號後才能登入<br>
          請點擊下方「前往註冊」建立帳號
        </div>
        <div style="margin-top:12px;">
          <button class="btn" type="button" id="btnRegister">前往註冊</button>
        </div>
      </div>
    </div>
  </div>

  <div id="errorBar"></div>

  <script defer src="login.js?v=20260722-1"></script>

</body>
</html>
