<main class="main">
<div class="topbar">
<div class="leftTop">
<button class="hamburger" id="logs-handler-2">☰</button>
<div class="systemSwitchWrap logs-inline-style-2" id="tenantSwitchWrap">
<label class="systemLabel">目前客戶</label>
<select class="systemSelect" id="tenantSelect"></select>
</div>
<div class="systemSwitchWrap logs-inline-style-2" id="systemSwitchWrap">
<label class="systemLabel">目前機台</label>
<select class="systemSelect" id="systemSelect"></select>
</div>
</div>
<div class="filterBar">
<button class="filterBtn active" data-filter="all">全部</button>
<button class="filterBtn" data-filter="立可帶">立可帶</button>
<button class="filterBtn" data-filter="橡皮擦">橡皮擦</button>
<button class="filterBtn" data-filter="螺帽">螺帽</button>
</div>
<div class="rightTop">
<button class="btn" id="logs-handler-3" type="button">⬇ 匯出 CSV</button>
<button class="btn btnPrimary" id="logs-handler-4" type="button">⟳ 重新整理</button>
</div>
</div>
<section class="grid">
<div class="card span-12">
<h3>🧾 事件紀錄</h3>
<div class="logsScrollBox">
<table>
<thead>
<tr>
<th class="logs-inline-style-3">時間</th>
<th class="logs-inline-style-4">狀態</th>
<th class="logs-inline-style-5">產品</th>
<th>備註</th>
<th class="logs-inline-style-6">NG圖片</th>
</tr>
</thead>
<tbody id="logBody"></tbody>
</table>
</div>
</div>
</section>
<div id="errorBar"></div>
</main>

<div class="imageModal" id="imageModal">
<div class="imageModalBox">
<button class="imageModalClose" id="logs-handler-5" type="button">×</button>
<img alt="NG 瑕疵圖片" id="imageModalImg" src=""/>
<div class="imageModalCaption" id="imageModalCaption"></div>
</div>
