<input id="ngThreshold" placeholder="例如 3"/>

</div>

<h3>FPS 下限警戒</h3>

          </div>
<input id="fpsMin" placeholder="例如 12"/>
<div class="settings-inline-style-6">允許範圍：5 ~ 60</div>
</div>
