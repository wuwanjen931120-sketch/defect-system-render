<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>註冊 - 瑕疵辨識與分流系統</title>
<link href="style.css" rel="stylesheet"/>
<link href="register.page.css" rel="stylesheet"/><script src="vendor/dompurify.min.js"></script><script src="safe-dom.js"></script></head>
<body>
<div class="wrap">
<div class="card">
<h1 class="title">客戶註冊</h1>
<div class="sub">建立新客戶帳號後，系統會自動建立專屬客戶、預設機台與登入帳號。</div>
<div class="err" id="errBox"></div>
<div class="ok" id="okBox"></div>
<label for="company">公司名稱</label>
<input id="company" placeholder="例如：工廠A"/>
<label for="username">帳號</label>
<input id="username" placeholder="請輸入登入帳號"/>
<label for="password">密碼</label>
<input autocomplete="new-password" id="password" maxlength="128" minlength="10" placeholder="至少 10 碼，需含英文與數字" type="password"/>
<div class="sub register-inline-style-1">密碼至少 10 碼，需同時包含英文字母與數字。</div>
<label for="inviteCode">註冊邀請碼（管理員有設定時才需要）</label>
<input autocomplete="off" id="inviteCode" maxlength="128" placeholder="未設定可留空" type="password"/>
<div class="row">
<button class="btn btnPrimary" id="btnRegister">註冊</button>
<button class="btn" id="register-handler-1" type="button">回登入</button>
</div>
</div>
</div>
<script src="register.inline-1.js"></script>
<script src="register.handlers.js"></script></body>
</html>
