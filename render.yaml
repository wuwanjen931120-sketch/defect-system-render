services:
  - type: web
    name: defect-system
    runtime: node
    buildCommand: bash render-build.sh
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.23.1
      - key: APP_BASE_URL
        value: https://defect-system-render.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://defect-system-render.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 4h
      - key: JWT_COOKIE_MAX_AGE_SECONDS
        value: "14400"
      - key: AUTH_COOKIE_NAME
        value: defect_session
      - key: MQTT_URL
        sync: false
      - key: MQTT_PORT
        value: "8883"
      - key: HIVEMQ_USER
        sync: false
      - key: HIVEMQ_PASS
        sync: false
      - key: MQTT_REPORT_TOPIC
        value: factory/defect/report
      - key: MQTT_ESTOP_TOPIC_TEMPLATE
        value: factory/control/estop/{system_id}
      - key: MQTT_ESTOP_ACK_TOPIC
        value: factory/control/estop/ack/+
      - key: SMTP_PROVIDER
        value: brevo
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "2525"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.6-flash
      - key: AI_REQUESTS_PER_MINUTE
        value: "5"
      - key: AI_REQUESTS_PER_DAY
        value: "100"
      - key: ALLOW_PUBLIC_REGISTRATION
        value: "true"
      - key: REGISTRATION_INVITE_CODE
        sync: false
      - key: DEFECT_RETENTION_DAYS
        value: "0"
      - key: AUDIT_RETENTION_DAYS
        value: "0"
