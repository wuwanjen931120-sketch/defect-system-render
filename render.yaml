services:
  - type: web
    name: defect-system
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HIVEMQ_USER
        sync: false
      - key: HIVEMQ_PASS
        sync: false
      - key: BREVO_SMTP_LOGIN
        sync: false
      - key: BREVO_SMTP_KEY
        sync: false
      - key: BREVO_SMTP_PORT
        value: 2525
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: CORS_ORIGINS
        value: https://defect-system-render.onrender.com
      - key: ALLOW_PASSWORD_LOGIN
        value: "false"
      - key: ALERT_THRESHOLD
        value: "3"
      - key: ALERT_WINDOW_MINUTES
        value: "10"
      - key: ALERT_COOLDOWN_MINUTES
        value: "10"
