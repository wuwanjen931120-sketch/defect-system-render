<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>註冊 - 瑕疵辨識與分流系統</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .card{
      width:min(560px, 100%);
      background: rgba(18,35,59,.75);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      box-shadow: var(--shadow);
      padding:18px;
    }
    .title{
      font-size:22px;
      font-weight:900;
      margin:0 0 8px;
    }
    .sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      margin:0 0 14px;
    }
    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:10px 0 6px;
    }
    input{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline:none;
      box-sizing:border-box;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .err,.ok{
      margin-top:10px;
      display:none;
      padding:10px 12px;
      border-radius:14px;
      font-size:13px;
    }
    .err{
      background: rgba(239,68,68,.15);
      border:1px solid rgba(239,68,68,.28);
      color: rgba(231,238,252,.95);
    }
    .ok{
      background: rgba(34,197,94,.15);
      border:1px solid rgba(34,197,94,.28);
      color: rgba(231,238,252,.95);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">客戶註冊</h1>
      <div class="sub">建立新客戶帳號後，系統會自動建立專屬客戶、預設機台與登入帳號。</div>

      <div class="err" id="errBox"></div>
      <div class="ok" id="okBox"></div>

      <label for="company">公司名稱</label>
      <input id="company" placeholder="例如：工廠A" />

      <label for="username">帳號</label>
      <input id="username" placeholder="請輸入登入帳號" />

      <label for="password">密碼</label>
      <input id="password" type="password" placeholder="請輸入密碼" />

      <div class="row">
        <button class="btn btnPrimary" id="btnRegister">註冊</button>
        <button class="btn" type="button" onclick="location.href='login.html'">回登入</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    function showErr(msg){
      const errBox = document.getElementById("errBox");
      const okBox = document.getElementById("okBox");
      okBox.style.display = "none";
      errBox.style.display = "block";
      errBox.textContent = "⚠️ " + msg;
    }

    function showOk(msg){
      const errBox = document.getElementById("errBox");
      const okBox = document.getElementById("okBox");
      errBox.style.display = "none";
      okBox.style.display = "block";
      okBox.textContent = "✅ " + msg;
    }

    function clearMsg(){
      document.getElementById("errBox").style.display = "none";
      document.getElementById("okBox").style.display = "none";
    }

    async function doRegister(){
      clearMsg();

      const company = document.getElementById("company").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if(!company || !username || !password){
        showErr("請完整輸入公司名稱、帳號、密碼");
        return;
      }

      try{
        const res = await fetch(`${API_BASE}/api/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            company,
            username,
            password
          })
        });

        const data = await res.json();

        if(!res.ok){
          showErr(data.message || "註冊失敗");
          return;
        }

        showOk("註冊成功，2 秒後前往登入頁");
        setTimeout(() => {
          location.href = "login.html";
        }, 2000);

      }catch(err){
        console.error(err);
        showErr("無法連線後端或後端尚未部署最新版本");
      }
    }

    document.getElementById("btnRegister").addEventListener("click", doRegister);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doRegister();
    });
  </script>
</body>
</html>
