<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>MongoDB 管理頁</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      background:linear-gradient(135deg,#08111f,#10233b);
      color:#eaf2ff;
      font-family:"Microsoft JhengHei", Arial, sans-serif;
      font-size:18px;
    }

    .page{
      padding:28px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:22px;
      background:rgba(18,35,59,.82);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:20px;
    }

    h1{
      margin:0;
      font-size:34px;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 18px;
      font-weight:800;
      cursor:pointer;
      color:white;
      background:#244b7a;
      border:1px solid rgba(255,255,255,.15);
    }

    .btnPrimary{
      background:#2563eb;
    }

    .panel{
      background:rgba(18,35,59,.82);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
    }

    select{
      padding:12px;
      border-radius:12px;
      background:#0b1220;
      color:white;
      border:1px solid rgba(255,255,255,.18);
      font-size:17px;
      min-width:240px;
    }

    pre{
      max-height:600px;
      overflow:auto;
      background:#050b14;
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      padding:18px;
      font-size:15px;
      line-height:1.6;
      color:#dbeafe;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <div>
        <h1>MongoDB 管理頁</h1>
        <p>查看 users、tenants、systems、defects 真實資料</p>
      </div>

      <button class="btn" onclick="location.href='admin.html'">← 返回管理後台</button>
    </div>

    <div class="panel">
      <label>選擇 Collection：</label>
      <select id="collectionSelect"></select>
      <button class="btn btnPrimary" onclick="loadCollection()">讀取資料</button>
    </div>

    <div class="panel">
      <h2>資料內容</h2>
      <pre id="output">請先選擇 collection</pre>
    </div>

  </div>

<script>
const API_BASE = window.location.origin;

let token = "";
let role = "";

window.addEventListener("DOMContentLoaded", async () => {
  token = sessionStorage.getItem("token");
  role = sessionStorage.getItem("role");

  console.log("Mongo頁 token:", token);
  console.log("Mongo頁 role:", role);

  if (!token) {
    location.href = "login.html";
    return;
  }

  if (role !== "super_admin") {
    alert("只有 super_admin 可以查看 MongoDB 管理頁");
    location.href = "dashboard.html";
    return;
  }

  await loadCollections();
});

async function apiFetch(url){
  const res = await fetch(url, {
    headers:{
      Authorization: "Bearer " + token
    }
  });

  if (!res.ok) {
    throw new Error("API 錯誤：" + res.status);
  }

  return await res.json();
}

async function loadCollections(){
  const select = document.getElementById("collectionSelect");
  const data = await apiFetch(`${API_BASE}/api/admin/collections`);

  select.innerHTML = "";

  data.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
}

async function loadCollection(){
  const name = document.getElementById("collectionSelect").value;
  const output = document.getElementById("output");

  output.textContent = "資料讀取中...";

  try {
    const data = await apiFetch(`${API_BASE}/api/admin/collection/${name}`);
    output.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    console.error(err);
    output.textContent = "讀取失敗：" + err.message;
  }
}
</script>
</body>
</html>
